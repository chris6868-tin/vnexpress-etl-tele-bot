version: "3.8"

services:
  airflow-db:
    image: postgres:16
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    image: newsbot-airflow:latest
    depends_on:
      - airflow-db
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__CORE__FERNET_KEY: "aBx7yVtgkB0Gsj7EKz9PfQ=="
    volumes:
      - ..:/opt/airflow/app
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: >
      bash -lc "airflow db upgrade && \
               airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin --skip-connection-check || true && \
               airflow webserver"

  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    image: newsbot-airflow:latest
    depends_on:
      - airflow-webserver
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ..:/opt/airflow/app
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: airflow scheduler

volumes:
  airflow_postgres_data:
